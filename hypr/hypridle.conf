general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session    # Lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Screen darkens
listener {
    timeout = 540 # 9 min
    on-timeout = brightnessctl set 45% >/dev/null 2>&1
    on-resume  = brightnessctl set 100% >/dev/null 2>&1
}

# Lock the screen
listener {
    timeout = 600 # 10 min
    on-timeout = loginctl lock-session
}

# Turn off screen
listener {
    timeout = 900 # 15 min
    on-timeout = brightnessctl set 100% >/dev/null 2>&1 && hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend the system
listener {
    timeout = 1800 # 30 min
    on-timeout = systemctl suspend
}
